<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>ARCHE Pre-Seed Pitch Deck</title>
  <link rel="stylesheet" href="styles.css" />

<body>
  <header class="topbar">
    <div class="brand">
      <span class="mark">ARCHE</span>
      <span class="sub">Pre-Seed Pitch Deck</span>
    </div>
    <nav class="actions" aria-label="Deck controls">
      <a href="downloads/ARCHE_PreSeed_v4.pptx" download>Download PPTX</a>

    </nav>
  </header>

  <main class="deck-shell">
    <section class="viewer" aria-label="Slide viewer">
      <button class="nav prev" id="prevBtn" type="button" aria-label="Previous slide">‹</button>
      <figure class="slide-frame">
        <img id="slideImg" src="assets/slides/slide-01.png" alt="Slide 1: Title" />
      </figure>
      <button class="nav next" id="nextBtn" type="button" aria-label="Next slide">›</button>
    </section>

    <section class="meta" aria-label="Slide information">
      <div>
        <p class="eyebrow">ARCHEPERSONA | Confidential Pre-Seed Deck</p>
        <h1 id="slideTitle">Title</h1>
      </div>
      <div class="counter"><span id="currentSlide">01</span>/<span id="totalSlides">21</span></div>
    </section>

    <section class="filmstrip" id="filmstrip" aria-label="Slide thumbnails"></section>
  </main>

  <footer class="footer">
    <span>Keyboard: ← / →, space, Home, End</span>
  </footer>
